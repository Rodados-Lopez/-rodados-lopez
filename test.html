<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test TV</title>
<style>
body { background: #111; color: #fff; font-family: Arial, sans-serif; font-size: 20px; padding: 30px; }
.ok  { color: #00e676; }
.err { color: #ff3d3d; }
.inf { color: #ffc107; }
li   { margin: 10px 0; line-height: 1.5; }
</style>
</head>
<body>
<h2 style="color:#ff6200">🔍 Diagnóstico Rodados Lopez</h2>
<ul id="log"></ul>

<script>
var log = document.getElementById('log');

function add(msg, tipo) {
  var li = document.createElement('li');
  li.className = tipo || 'inf';
  li.innerHTML = msg;
  log.appendChild(li);
}

// 1. JS básico
add('✅ JavaScript funciona', 'ok');

// 2. Promise
try {
  if (typeof Promise === 'undefined') throw new Error('no existe');
  add('✅ Promise soportado', 'ok');
} catch(e) {
  add('❌ Promise NO soportado: ' + e.message, 'err');
}

// 3. XMLHttpRequest
try {
  var x = new XMLHttpRequest();
  add('✅ XMLHttpRequest soportado', 'ok');
} catch(e) {
  add('❌ XMLHttpRequest NO soportado: ' + e.message, 'err');
}

// 4. fetch
if (typeof fetch !== 'undefined') {
  add('✅ fetch() soportado', 'ok');
} else {
  add('⚠️ fetch() NO disponible (usaremos XHR)', 'inf');
}

// 5. Probar conexión a Firebase REST
add('⏳ Probando conexión a Firebase...', 'inf');
try {
  var xhr2 = new XMLHttpRequest();
  xhr2.open('GET', 'https://rodados-lopez-ea21b-default-rtdb.firebaseio.com/counter.json', true);
  xhr2.timeout = 8000;
  xhr2.onreadystatechange = function() {
    if (xhr2.readyState === 4) {
      if (xhr2.status === 200) {
        add('✅ Firebase REST OK — respuesta: ' + xhr2.responseText, 'ok');
        add('🎉 <strong>Todo funciona. El problema era el SDK de Firebase.</strong>', 'ok');
      } else if (xhr2.status === 0) {
        add('❌ Firebase: sin respuesta (status 0) — posible bloqueo CORS o red', 'err');
      } else {
        add('❌ Firebase: error HTTP ' + xhr2.status, 'err');
      }
    }
  };
  xhr2.ontimeout = function() {
    add('❌ Firebase: TIMEOUT — el TV no puede llegar a firebaseio.com', 'err');
  };
  xhr2.onerror = function() {
    add('❌ Firebase: ERROR DE RED — bloqueado o sin internet', 'err');
  };
  xhr2.send();
} catch(e) {
  add('❌ Error al hacer XHR: ' + e.message, 'err');
}

// 6. Probar carga de script externo (cdnjs)
add('⏳ Probando carga de scripts externos (cdnjs)...', 'inf');
var s = document.createElement('script');
s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
s.onload = function() { add('✅ cdnjs.cloudflare.com carga bien', 'ok'); };
s.onerror = function() { add('❌ cdnjs.cloudflare.com bloqueado', 'err'); };
document.head.appendChild(s);

// 7. User agent
add('ℹ️ Navegador: ' + navigator.userAgent, 'inf');
</script>
</body>
</html>
